<div class="recipe-step-item">
    <div class="step-number-pill">Шаг {{ step_index }}</div>
    <div class="step-card">
        <div class="step-image">
            {% if step.image_url %}
            <img src="{{ step.image_url }}"
                 alt="Шаг {{ step_index }}">
            {% endif %}
        </div>
        <div class="step-text">{{ step.text }}</div>
    </div>
</div>

<div class="comment-item comment-self">
    <div class="comment-author-pill user-comment-author">
        {{ comment.author.username }}
    </div>

    <div class="comment-meta">
        <span>Добавлен: {{ comment.created_at.strftime('%d.%m.%Y %H:%M') }}</span>

        {% if comment.is_edited %}
        <span>Изменён: {{ comment.updated_at.strftime('%d.%m.%Y %H:%M') }}</span>
        {% endif %}
    </div>

    <div class="comment-text-card comment-view-text">
        <div class="comment-text-content">{{ comment.text }}</div>
    </div>

    <form action="{{ url_for('edit_comment', comment_id=comment.id) }}" method="POST" class="comment-edit-form">
        <input type="hidden" name="next" value="{{ request.path }}">

        <textarea name="text" class="comment-edit-textarea" required>{{ comment.text }}</textarea>

        <div class="comment-edit-actions">
            <button type="submit" class="comment-action-btn comment-save-btn">
                Сохранить
            </button>

            <button type="button" class="comment-action-btn comment-cancel-edit-btn">
                Отмена
            </button>
        </div>
    </form>

    <div class="comment-actions">
        <button type="button" class="comment-action-btn comment-edit-btn">
            Редактировать
        </button>

        <form action="{{ url_for('delete_comment', comment_id=comment.id) }}"
              method="POST"
              class="comment-delete-form"
              style="display:inline;">
            <input type="hidden" name="next" value="{{ request.path }}">
            <button
                    type="button"
                    class="comment-action-btn comment-delete-btn js-open-comment-delete-modal"
                    data-comment-text="{{ comment.text|e }}"
            >Удалить</button>
        </form>
    </div>
</div>

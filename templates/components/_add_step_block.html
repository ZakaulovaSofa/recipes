<div class="step-block">
    <div class="step-number-pill">Шаг {{ loop.index if loop else 1 }}</div>
    <div class="step-card">
        <div class="step-image-dropzone">
            <label class="step-image-label file-upload-dropzone">
                <input
                        type="file"
                        name="step_images[]"
                        class="step-image-input file-upload-input"
                        accept="image/*"
                >
                <span class="step-image-placeholder file-upload-placeholder">Загрузите фото шага</span>
                <img class="file-upload-preview" alt="Предпросмотр фото шага">
            </label>
        </div>
        {# name="step_descriptions[]" соберет все тексты в список #}
        <textarea name="step_descriptions[]"
                  class="step-description-textarea"
                  placeholder="Описание шага..."
                  rows="3" required></textarea>
    </div>
    <button type="button" class="step-delete-btn" title="Удалить шаг">×</button>
</div>
